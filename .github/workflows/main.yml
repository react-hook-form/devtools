name: CI
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths-ignore:
      - ".gitignore"
      - ".npmignore"
      - "*.md"
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Lint
        run: |
          npm run lint:types
          npm run lint
      #      - name: Test
      #        run: npm test
      #        env:
      #          CI: true
      - name: Build
        run: npm run build
